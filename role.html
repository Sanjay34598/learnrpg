<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="LearnRPG — your personalised learning path. See the full course catalog for your chosen career role." />
  <title>LearnRPG — Learning Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/role.css" />
</head>
<body>

  <!-- ── Navigation ──────────────────────────────────────────────── -->
  <nav class="nav">
    <a href="index.html" class="nav-brand">⚔️ LearnRPG</a>
    <a href="index.html" class="back-btn" id="backBtn">← All Paths</a>
  </nav>

  <!-- ── Role hero ───────────────────────────────────────────────── -->
  <section class="role-hero" id="roleHero">
    <div class="role-hero-inner">
      <div class="role-hero-icon" id="roleIcon">📊</div>
      <h1 id="roleName">Loading…</h1>
      <p class="role-hero-tagline" id="roleTagline"></p>
      <p class="role-hero-desc" id="roleDesc"></p>

      <div class="role-progress-row">
        <div class="role-progress-bar-wrap">
          <div class="role-progress-label">
            <span>Overall progress</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="role-progress-bar">
            <div class="role-progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div class="role-stat-chips">
          <div class="role-stat-chip" id="xpChip">0 XP</div>
          <div class="role-stat-chip" id="missionsChip">0 missions done</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Learning sections ───────────────────────────────────────── -->
  <div class="path-container" id="pathContainer">
    <!-- Rendered by role.js -->
  </div>

  <!-- ── Error state (shown when role ID is invalid) ─────────────── -->
  <div id="errorState" style="display:none">
    <div style="font-size:48px">🗺️</div>
    <h2>Path not found</h2>
    <p>We couldn't find that career path. Try choosing one from the home page.</p>
    <a href="index.html">← Back to all paths</a>
  </div>

  <!-- Scripts -->
  <script src="js/data/courses.js"></script>
  <script src="js/data/roles.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/role.js"></script>
</body>
</html>
